<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arkanoid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Arkanoid</h1>

    <div class="hud">
        <div class="hud-score">Score: <span id="score">0</span></div>
        <div class="hud-level">Level: <span id="level-display">1</span></div>
        <div class="hud-lives" id="lives-display"></div>
    </div>

    <div class="canvas-wrap">
        <canvas id="board" width="360" height="480"></canvas>
        <div class="overlay hidden" id="overlay">
            <h2 id="overlay-title"></h2>
            <p id="overlay-msg"></p>
            <button id="next-level" type="button">Next Level</button>
            <button id="play-again" type="button">Play Again</button>
        </div>
    </div>

    <div class="mobile-controls">
        <button id="btn-left"  type="button" aria-label="Move left">&#9664;</button>
        <button id="btn-right" type="button" aria-label="Move right">&#9654;</button>
    </div>

    <p class="hint">Arrow keys or mouse to move &middot; Space to launch</p>

    <script src="game.js"></script>
</body>
</html>
